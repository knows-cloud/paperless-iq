[project]
name = "paperless-iq"
version = "1.1.0"
description = "AI-powered metadata suggestions for Paperless NGX"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.22.1",
    "alembic>=1.18.5",
    "anthropic>=0.116.0",
    "boto3>=1.43.54",
    "chromadb>=1.5.5",
    "croniter>=6.2.4",
    "cryptography>=48.0.1",
    "fastapi>=0.139.2",
    "greenlet>=3.5.4",
    "httpx>=0.28.1",
    "ollama>=0.6.1",
    "openai>=2.47.0",
    "pydantic>=2.12.5",
    "Pillow>=10.0",
    "pypdfium2>=5.12.1",
    "qdrant-client>=1.12",
    "sqlalchemy>=2.0.51",
    "uvicorn>=0.51.0",
]

[project.optional-dependencies]
# Local cross-encoder reranker (rerank_method="local"). Heavy (pulls torch);
# installed only on demand. Imported lazily at runtime — see backend/rerankers.py.
rerank-local = [
    "sentence-transformers>=5.6.0",
]
# Sparse encoder for Qdrant hybrid search (qdrant_hybrid_search). Pulls
# onnxruntime; imported lazily — see QdrantVectorStore._ensure_sparse_encoder.
qdrant-hybrid = [
    "fastembed>=0.3",
]

[dependency-groups]
dev = [
    "bandit>=1.9.4",
    "hypothesis>=6.161.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.22",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "live: hits real external APIs and costs money — excluded by default and in CI",
]
addopts = "-m 'not live'"

[tool.setuptools.packages.find]
include = ["backend*"]

[tool.ruff]
target-version = "py312"
# Alembic-generated files have their own conventions; don't lint them.
extend-exclude = ["backend/alembic", ".venv"]

[tool.ruff.lint.per-file-ignores]
# logging.basicConfig() must run before backend modules are imported so their
# module-level loggers inherit the config — this intentionally puts statements
# between imports (E402). See the comment at the top of main.py.
"backend/main.py" = ["E402"]
