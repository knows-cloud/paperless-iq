name: Sync docs to Wiki

# Mirrors the in-repo docs/ folder (the source of truth) into the GitHub Wiki,
# so the browser-editable Wiki always matches the versioned, PR-reviewed docs.
#
# One-time setup (required before this runs):
#   1. Repo -> Settings -> Features -> enable "Wikis".
#   2. Open the Wiki tab and click "Create the first page" -> Save (any content).
#      This initialises the <repo>.wiki.git repository that this job pushes to.
# After that, every push to main that touches docs/** updates the Wiki.
#
# Note: edit docs in-repo, not in the Wiki UI -- the Wiki is a mirror and manual
# edits to mirrored pages will be overwritten on the next sync.
#
# Security: the only ${{ }} interpolation below is secrets.GITHUB_TOKEN, mapped
# into an env var (the recommended pattern). No untrusted event input (commit
# messages, issue/PR titles, branch names) is used in any run: step.

on:
  push:
    branches: [main]
    paths:
      - "docs/Home.md"
      - "docs/Getting-Started.md"
      - "docs/Document-Analysis.md"
      - "docs/Discovery.md"
      - "docs/Automation.md"
      - "docs/Grooming.md"
      - "docs/LLM-Providers.md"
      - "docs/Vector-Stores.md"
      - "docs/SETTINGS.md"
      - "docs/Troubleshooting.md"
      - "docs/ARCHITECTURE.md"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone wiki, mirror docs, push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if ! git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "::error::Could not clone the wiki repo. Enable Wikis and create the first page once (see this workflow's header)."
            exit 1
          fi

          # Curated allowlist — the repo is public, so only user-facing docs are
          # published. Format: "<docs source>|<Wiki Page Name>". Add lines here
          # to publish more pages (and to the push-trigger paths above).
          PAGES="
          Home|Home
          Getting-Started|Getting-Started
          Document-Analysis|Document-Analysis
          Discovery|Discovery
          Automation|Automation
          Grooming|Grooming
          LLM-Providers|LLM-Providers
          Vector-Stores|Vector-Stores
          SETTINGS|Settings
          Troubleshooting|Troubleshooting
          ARCHITECTURE|Architecture
          "

          # Build the sidebar with `printf '%s\n'` and one argument per line.
          # Do NOT use `printf '- [[Home]]\n'`: a format string beginning with
          # "- " is parsed as an option flag under bash and aborts the job
          # ("printf: - : invalid option"). A '%s\n' format is immune.
          printf '%s\n' \
            '### Paperless IQ' \
            '- [[Home]]' \
            '' \
            '### User Guide' \
            '- [[Getting-Started]]' \
            '- [[Document-Analysis]]' \
            '- [[Discovery]]' \
            '- [[Automation]]' \
            '- [[Grooming]]' \
            '' \
            '### Reference' \
            '- [[LLM-Providers]]' \
            '- [[Vector-Stores]]' \
            '- [[Settings]]' \
            '- [[Troubleshooting]]' \
            '' \
            '### Developer' \
            '- [[Architecture]]' \
            > wiki/_Sidebar.md

          echo "$PAGES" | while IFS='|' read -r src page; do
            src="${src// /}"
            page="${page// /}"
            [ -n "$src" ] || continue
            cp "docs/${src}.md" "wiki/${page}.md"
          done

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "docs: sync from ${GITHUB_SHA::7}"
            git push
          fi
