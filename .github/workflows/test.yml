name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Restore Hypothesis example database
        uses: actions/cache@v4
        with:
          path: .hypothesis
          # Accumulates on the branch; falls back to main so CI builds on prior findings.
          key: hypothesis-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            hypothesis-${{ github.ref_name }}-
            hypothesis-main-

      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (tsc + i18n + audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: i18n completeness check
        run: npm run check:i18n
