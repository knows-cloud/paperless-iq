version: 2
updates:
  # npm — frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # @mantine/core pins an exact peer on @mantine/hooks, so split PRs
      # produce an ERESOLVE conflict. Always bump the pair together.
      mantine:
        patterns:
          - "@mantine/*"

  # uv/pip — Python backend dependencies. This block DOES cover Python; the
  # boto3/openai/fastapi/etc. bumps come from here. Note: Dependabot opens uv
  # *version* PRs, but its *security*-update support for the uv ecosystem lags,
  # so alert-driven security PRs (e.g. Pillow) may need a manual bump until then.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  # GitHub Actions used by the CI/release workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
